{% extends 'base.html' %}

{% block content %}
<!DOCTYPE html>
<html>
<head>
    <title>Create Drive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">
    <div class="card shadow-sm p-4" style="max-width: 600px; margin:auto;">

        <h3 class="text-center mb-4">Create Placement Drive</h3>

        <form action="/company/create_drive" method="POST" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">Job Title</label>
                <input type="text" name="job_title" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Job Description</label>
                <textarea name="job_description" rows="4" class="form-control" required></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Eligibility Criteria</label>
                <textarea name="eligibility_criteria" rows="3" class="form-control" required></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Application Deadline</label>
                <input type="date" name="application_deadline" 
                       class="form-control"
                       required>
            </div>

            <!-- ✅ PDF Upload -->
            <div class="mb-3">
                <label class="form-label">Upload JD (PDF)</label>
                <input type="file" name="jd_pdf" class="form-control" accept=".pdf">
            </div>

            <button type="submit" class="btn btn-success w-100">
                Create Drive
            </button>

        </form>

    </div>
</div>

</body>
</html>
{% endblock %}
